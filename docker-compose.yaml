# Spins up FastAPI, BentoML, and Triton as isolated containers.
#
# NOTE:  Build the app image first with
#        docker build -t llm-inference-stack .
#
# Port map:
#   FastAPI  → http://localhost:8000   (Swagger: /docs)
#   BentoML  → http://localhost:3000
#   Triton   → http://localhost:8001   (HTTP inference)
#              http://localhost:8002   (gRPC)
#              http://localhost:8003   (metrics)  
# --------------------------------------------------------------
 
services:
 
  # FastAPI + uvicorn
  fastapi:
    build: .
    image: llm-inference-stack
    container_name: llm_fastapi
    command: >
      uvicorn serve.fastapi_app_onnx:app   
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./model_onnx:/app/model_onnx:ro      # mount exported model read-only
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
 
  # BentoML 
  bentoml:
    build: .
    image: llm-inference-stack
    container_name: llm_bentoml
    command: >
      bentoml serve serve.bentoml_onnx_service:GPT2OnnxService
      --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./model_onnx:/app/model_onnx:ro
    environment:
      - PYTHONUNBUFFERED=1
 
  # Triton Inference Server
  triton:
    image: nvcr.io/nvidia/tritonserver:24.10-py3
    container_name: llm_triton
    command: tritonserver --model-repository=/models
    ports:
      - "8001:8000"    # HTTP  — offset to avoid conflict with FastAPI on 8000
      - "8002:8001"    # gRPC
      - "8003:8002"    # Prometheus metrics
    volumes:
      - ./model_repository:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
 
  # Benchmark runner (runs once then exits) 
  benchmark:
    build: .
    image: llm-inference-stack
    container_name: llm_benchmark
    command: python benchmarks/run_benchmark.py
    depends_on:
      fastapi:
        condition: service_healthy
      triton:
        condition: service_healthy
    environment:
      - FASTAPI_URL=http://fastapi:8000
      - BENTOML_URL=http://bentoml:3000
      - TRITON_URL=triton:8000     # internal Docker network — no http://
    profiles:
      - benchmark    # only runs with: docker-compose --profile benchmark up
  

  